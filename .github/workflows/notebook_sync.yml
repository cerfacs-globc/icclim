name: sync-notebooks

on:
  push:
    branches:
      - master
    paths:
      - 'doc/source/tutorials/notebooks/C4I_Use_Cases/*.ipynb'
      - 'doc/source/tutorials/notebooks/Copernicus_Climate_Change_Service_CDS/*.ipynb'
      - '.github/workflows/notebook_sync.yml'
  workflow_dispatch:


jobs:
  sync-gitlab:
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Sync to GitLab
        env:
          GITLAB_SSH_PRIVATE_KEY: ${{ secrets.GITLAB_SSH_PRIVATE_KEY }}
          GIT_AUTHOR_NAME: "GitHub Actions Bot"
          GIT_AUTHOR_EMAIL: "actions@github.com"
          GIT_COMMITTER_NAME: "GitHub Actions Bot"
          GIT_COMMITTER_EMAIL: "actions@github.com"
        run: |
          mkdir -p ~/.ssh
          echo "$GITLAB_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan gitlab.com >> ~/.ssh/known_hosts

          git clone git@gitlab.com:is-enes-cdi-c4i/notebooks.git temp_sync
          rm -f temp_sync/*.ipynb
          mkdir -p temp_sync/C4I_Use_Cases
          mkdir -p temp_sync/Copernicus_Climate_Change_Service_CDS
          rsync -av --delete \
            doc/source/tutorials/notebooks/C4I_Use_Cases/ \
            temp_sync/C4I_Use_Cases/
          rsync -av --delete \
            doc/source/tutorials/notebooks/Copernicus_Climate_Change_Service_CDS/ \
            temp_sync/Copernicus_Climate_Change_Service_CDS/
          cd temp_sync
          git add .
          if git diff --staged --quiet; then
            echo "No changes to sync"
          else
            git commit -m "Sync notebooks from icclim master"
            git push origin master
          fi

  sync-github:
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Sync to GitHub External
        env:
          EXTERNAL_GITHUB_TOKEN: ${{ secrets.EXTERNAL_GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: "GitHub Actions Bot"
          GIT_AUTHOR_EMAIL: "actions@github.com"
          GIT_COMMITTER_NAME: "GitHub Actions Bot"
          GIT_COMMITTER_EMAIL: "actions@github.com"
        run: |
          git clone https://x-access-token:${EXTERNAL_GITHUB_TOKEN}@github.com/cerfacs-globc/copernicus-training.git temp_sync
          rm -f temp_sync/*.ipynb
          mkdir -p temp_sync/C4I_Use_Cases
          mkdir -p temp_sync/Copernicus_Climate_Change_Service_CDS
          rsync -av --delete \
            doc/source/tutorials/notebooks/C4I_Use_Cases/ \
            temp_sync/C4I_Use_Cases/
          rsync -av --delete \
            doc/source/tutorials/notebooks/Copernicus_Climate_Change_Service_CDS/ \
            temp_sync/Copernicus_Climate_Change_Service_CDS/
          cd temp_sync
          git add .
          if git diff --staged --quiet; then
            echo "No changes to sync"
          else
            git commit -m "Sync notebooks from icclim master"
            git push origin master
          fi
